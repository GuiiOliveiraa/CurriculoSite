name: Atualizar Currículo via IA

on:
  push:
    paths:
      - 'ai-cv/**'
      - '.github/workflows/update-cv.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-cv/requirements.txt

      - name: Processar knowledge via IA
        run: python ai-cv/scripts/process_knowledge.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash

      - name: Verificar alterações no cv.json
        id: changes
        run: |
          if git diff --quiet site/data/cv.json site/data/processed_files.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Configurar Git
        run: |
          git config user.name "cv-bot"
          git config user.email "cv-automation@github.local"

      - name: Commit e push das alterações
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add site/data/cv.json site/data/processed_files.json
          git add ai-cv/logs/ 2>/dev/null || true
          git commit -m "chore: atualizar cv.json via IA"
          git push origin ${{ github.ref }}

      - name: Relatar atualização realizada
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "Currículo atualizado com sucesso via IA"
          echo "Data: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Arquivo: site/data/cv.json"

      - name: Relatar ausência de mudanças
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "Nenhuma alteração necessária no cv.json"
          echo "Os arquivos em ai-cv/knowledge/ não geraram novos dados estruturados."
